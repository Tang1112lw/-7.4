<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光印记 - 家庭成长记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdf6e3 0%, #f5e6d3 100%);
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #8B5E3C 0%, #6B3A2A 100%) !important;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .nav-link {
            font-size: 1.1rem;
            margin: 0 5px;
            transition: all 0.3s;
        }
        .nav-link:hover {
            transform: translateY(-2px);
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .card-header {
            background: linear-gradient(135deg, #8B5E3C 0%, #6B3A2A 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            padding: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8B5E3C 0%, #6B3A2A 100%);
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 25px;
            transition: all 0.3s;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(107, 58, 42, 0.4);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e8ddd0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #8B5E3C;
            box-shadow: 0 0 0 0.2rem rgba(139, 94, 60, 0.25);
        }
        .form-label {
            font-weight: 500;
            color: #5a4a3a;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #8B5E3C;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span style="font-size:1.8rem;margin-right:8px;">📖</span>时光印记
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/member">家庭成员</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/story">成长故事</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/register">注册</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        {% block content %}
        {% endblock %}
    </div>

    <div class="footer">
        <p class="mb-0">© 2026 时光印记 · 记录家庭的每一刻美好</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
