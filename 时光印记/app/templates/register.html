{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header">
                <span style="font-size:1.5rem;margin-right:8px;">✨</span>注册时光印记
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{error}}
                </div>
                {% endif %}
                <form action="/register" method="post">
                    <div class="mb-4">
                        <label class="form-label">用户名</label>
                        <input type="text" name="username" class="form-control" placeholder="给自己取个名字" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">密码</label>
                        <input type="password" name="password" class="form-control" placeholder="设置一个安全的密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary">注 册</button>
                </form>
                <div class="text-center mt-3">
                    <span style="color:#8B5E3C;">已有账号？</span>
                    <a href="/login" style="color:#6B3A2A;font-weight:bold;text-decoration:none;">去登录</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
