{% extends "base.html" %}

 {% block content %}
 <div class="row">
     <div class="col-12">
         <div class="d-flex justify-content-between align-items-center mb-4">
             <h2 style="color:#6B3A2A;">👨‍👩‍👧‍👦 我的家人</h2>
             <a href="/member/add" class="btn btn-primary">➕ 添加家人</a>
         </div>

         {% if members %}
             <div class="row">
                 {% for member in members %}
                 <div class="col-md-6 mb-4">
                     <div class="card h-100">
                         <div class="card-body">
                             <div class="d-flex justify-content-between">
                                 <h4 style="color:#6B3A2A;">{{ member.name }}</h4>
                                 <div>
                                     <a href="#" class="btn btn-sm btn-outline-primary">✏️</a>
                                     <a href="#" class="btn btn-sm btn-outline-danger">🗑️</a>
                                 </div>
                             </div>
                             <p class="mb-2" style="color:#8B5E3C;">
                                 🎂 生日：{{ member.birthday }}
                             </p>
                             <a href="#" class="btn btn-sm"
style="background:#f5e6d3;color:#6B3A2A;">
                                 📖 查看故事
                             </a>
                         </div>
                     </div>
                 </div>
                 {% endfor %}
             </div>
         {% else %}
             <div class="card">
                 <div class="card-body text-center py-5">
                     <p style="font-size:3rem;margin-bottom:1rem;">🏠</p>
                     <h4 style="color:#8B5E3C;">还没有添加家人</h4>
                     <p style="color:#aaa;">点击上方「添加家人」开始记录吧！</p>
                 </div>
             </div>
         {% endif %}
     </div>
 </div>
 {% endblock %}
